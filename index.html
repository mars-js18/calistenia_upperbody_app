<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hang Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            -webkit-tap-highlight-color: transparent;
        }

        .font-mono-timer {
            font-family: 'Roboto Mono', monospace;
        }

        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .timer-circle {
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }
    </style>

    <script>
        // --- SISTEMA PWA DINÁMICO (TODO EN 1 ARCHIVO) ---
        
        // 1. Crear icono dinámico SVG a Base64
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><rect width="512" height="512" fill="#0f172a"/><path d="M256 80c0-26.5-21.5-48-48-48s-48 21.5-48 48c0 14.3 6.3 27.2 16.2 36.2l12.4 11.2c-23 15-40.4 37.9-48.4 65.5L127.5 233c-8.5 25.4-36.1 39-61.5 30.5s-39-36.1-30.5-61.5l12.7-38.2C60 119.3 111.4 83.2 170.8 71.9c11.9-24.3 36.7-40 64.6-40s52.7 15.7 64.6 40c59.4 11.3 110.8 47.4 122.6 91.9l12.7 38.2c8.5 25.4-5.1 53-30.5 61.5s-53-5.1-61.5-30.5l-12.7-38.2c-8-27.6-25.4-50.5-48.4-65.5l12.4-11.2C305.7 107.2 312 94.3 312 80c0-26.5-21.5-48-48-48zm-16 176v160c0 35.3 28.7 64 64 64h16c26.5 0 48-21.5 48-48s-21.5-48-48-48h-16V256c0-26.5-21.5-48-48-48s-48 21.5-48 48z" fill="#10b981"/></svg>`;
        const iconBase64 = 'data:image/svg+xml;base64,' + btoa(svgIcon);

        // 2. Generar Manifest JSON
        const manifest = {
            name: "Dead Hang Tracker",
            short_name: "HangTracker",
            start_url: "./",
            display: "standalone",
            background_color: "#0f172a",
            theme_color: "#10b981",
            icons: [{ src: iconBase64, sizes: "512x512", type: "image/svg+xml" }]
        };
        const manifestString = JSON.stringify(manifest);
        const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
        
        document.write(`<link rel="manifest" href="${manifestUrl}">`);
        document.write(`<meta name="theme-color" content="#10b981">`);

        // 3. Generar e inyectar Service Worker mediante Blob
        const swCode = `
            const CACHE_NAME = 'hang-tracker-v1';
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', (e) => {
                // PWA offline bypass simple para Single File
                e.respondWith(fetch(e.request).catch(() => new Response("Offline mode")));
            });
        `;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW fallback error:', err));
            });
        }
    </script>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-800 p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-2">
            <i class="fa-solid fa-hands-holding-circle"></i> Hang Tracker
        </h1>
        <button id="btnInstall" class="hidden text-sm bg-emerald-600 text-white px-3 py-1 rounded-full shadow hover:bg-emerald-500 transition">
            <i class="fa-solid fa-download mr-1"></i> Instalar
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar relative p-4 pb-24">
        
        <!-- VISTA: CRONÓMETRO -->
        <section id="view-timer" class="tab-content active flex flex-col items-center justify-center h-full">
            
            <div class="bg-slate-800 p-4 rounded-2xl shadow-lg w-full max-w-sm mb-6 flex flex-col items-center border border-slate-700">
                <label class="text-slate-400 text-sm mb-2 font-semibold">Objetivo (Segundos)</label>
                <div class="flex items-center gap-2 text-2xl">
                    <button onclick="adjustTarget(-5)" class="w-10 h-10 rounded-full bg-slate-700 text-emerald-400 hover:bg-slate-600 active:scale-95 transition flex items-center justify-center"><i class="fa-solid fa-minus"></i></button>
                    <input type="number" id="inputTarget" value="60" class="w-24 bg-transparent text-center font-bold text-white outline-none border-b-2 border-emerald-500 focus:border-emerald-300">
                    <button onclick="adjustTarget(5)" class="w-10 h-10 rounded-full bg-slate-700 text-emerald-400 hover:bg-slate-600 active:scale-95 transition flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
                </div>
                <p class="text-xs text-slate-500 mt-2 text-center">Sonará la alarma fuerte y vibrará al llegar.</p>
            </div>

            <!-- Círculo del temporizador -->
            <div class="relative w-64 h-64 flex items-center justify-center mb-8">
                <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="6"></circle>
                    <circle id="progressCircle" cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="6" 
                            stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="0" class="timer-circle"></circle>
                </svg>
                <div class="z-10 flex flex-col items-center">
                    <span id="phaseText" class="text-sm font-semibold tracking-widest text-emerald-400 uppercase mb-1">LISTO</span>
                    <span id="timeDisplay" class="text-6xl font-mono-timer font-bold tracking-tight text-white">00.0</span>
                </div>
            </div>

            <!-- Botones de Control -->
            <div class="flex gap-4">
                <button id="btnStart" class="bg-emerald-500 text-slate-900 font-bold text-xl py-4 px-12 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.4)] active:scale-95 transition-transform flex items-center gap-2">
                    <i class="fa-solid fa-play"></i> INICIAR
                </button>
                <button id="btnStop" class="hidden bg-red-500 text-white font-bold text-xl py-4 px-12 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95 transition-transform flex items-center gap-2">
                    <i class="fa-solid fa-stop"></i> PARAR
                </button>
            </div>
            
            <!-- Mensaje temporal -->
            <p id="saveMsg" class="mt-4 text-emerald-400 font-semibold opacity-0 transition-opacity duration-300">¡Sesión guardada!</p>

        </section>

        <!-- VISTA: HISTORIAL -->
        <section id="view-history" class="tab-content h-full">
            <h2 class="text-2xl font-bold mb-4 text-emerald-400"><i class="fa-solid fa-chart-line mr-2"></i>Progreso</h2>
            <div class="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 overflow-hidden">
                <div id="historyList" class="divide-y divide-slate-700">
                    <!-- Registros dinámicos -->
                </div>
                <div id="emptyHistory" class="p-8 text-center text-slate-500 hidden">
                    <i class="fa-solid fa-dumbbell text-4xl mb-3 opacity-50"></i>
                    <p>Aún no hay registros. ¡A colgarse!</p>
                </div>
            </div>
        </section>

        <!-- VISTA: AJUSTES -->
        <section id="view-settings" class="tab-content h-full">
            <h2 class="text-2xl font-bold mb-4 text-emerald-400"><i class="fa-solid fa-gear mr-2"></i>Ajustes y Respaldo</h2>
            
            <div class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700 space-y-6">
                <div>
                    <h3 class="font-semibold text-lg mb-2 text-white">Copias de Seguridad</h3>
                    <p class="text-sm text-slate-400 mb-4">Exporta tu progreso para no perderlo, o importa datos de otro dispositivo.</p>
                    
                    <div class="flex gap-3">
                        <button onclick="exportData()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold transition flex justify-center items-center gap-2">
                            <i class="fa-solid fa-file-export"></i> Exportar
                        </button>
                        <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold transition flex justify-center items-center gap-2">
                            <i class="fa-solid fa-file-import"></i> Importar
                        </button>
                        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-6">
                    <h3 class="font-semibold text-lg mb-2 text-red-400">Peligro</h3>
                    <button onclick="clearHistory()" class="w-full bg-red-900/30 text-red-400 border border-red-800 hover:bg-red-900/50 py-3 rounded-xl font-semibold transition flex justify-center items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> Borrar Todo el Historial
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Barra de Navegación Inferior -->
    <nav class="bg-slate-800 border-t border-slate-700 absolute bottom-0 w-full flex justify-around pb-safe">
        <button onclick="switchTab('timer')" class="nav-btn flex-1 py-4 flex flex-col items-center text-emerald-400 transition" data-target="timer">
            <i class="fa-solid fa-stopwatch text-xl mb-1"></i>
            <span class="text-xs font-semibold">Temporizador</span>
        </button>
        <button onclick="switchTab('history')" class="nav-btn flex-1 py-4 flex flex-col items-center text-slate-500 hover:text-slate-300 transition" data-target="history">
            <i class="fa-solid fa-list text-xl mb-1"></i>
            <span class="text-xs font-semibold">Historial</span>
        </button>
        <button onclick="switchTab('settings')" class="nav-btn flex-1 py-4 flex flex-col items-center text-slate-500 hover:text-slate-300 transition" data-target="settings">
            <i class="fa-solid fa-gear text-xl mb-1"></i>
            <span class="text-xs font-semibold">Ajustes</span>
        </button>
    </nav>

    <!-- Script Principal -->
    <script>
        // --- AUDIO ENGINE (Synthesizer sin archivos) ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(frequency, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function beepPrep() { playBeep(600, 'sine', 0.2, 0.5); } // Pitido corto y suave
        function beepStart() { playBeep(1000, 'square', 0.6, 1.0); } // Pitido fuerte inicio
        function beepGoal() { 
            // Sirena/Alarma de objetivo cumplido
            playBeep(800, 'square', 0.3, 1.0);
            setTimeout(() => playBeep(1200, 'square', 0.3, 1.0), 150);
            setTimeout(() => playBeep(800, 'square', 0.3, 1.0), 300);
            setTimeout(() => playBeep(1200, 'square', 0.8, 1.0), 450);
        }

        // --- WAKE LOCK API (Mantener pantalla encendida) ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.warn('Wake Lock error:', err); }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        // --- ESTADO DEL APLICATIVO ---
        const PREP_TIME = 8000; // 8 segundos
        let state = 'IDLE'; // IDLE, PREP, HANGING
        let startTime = 0;
        let timerInterval = null;
        let targetMs = 60000;
        let goalReached = false;
        
        // Elementos UI
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const timeDisplay = document.getElementById('timeDisplay');
        const phaseText = document.getElementById('phaseText');
        const inputTarget = document.getElementById('inputTarget');
        const progressCircle = document.getElementById('progressCircle');
        const saveMsg = document.getElementById('saveMsg');

        function adjustTarget(val) {
            let current = parseInt(inputTarget.value) || 0;
            current = Math.max(5, current + val);
            inputTarget.value = current;
        }

        // --- LÓGICA DEL CRONÓMETRO ---
        function updateCircle(percent, color) {
            const circleLength = 283; // 2 * pi * r (45)
            const offset = circleLength - (percent / 100) * circleLength;
            progressCircle.style.strokeDashoffset = offset;
            progressCircle.setAttribute('stroke', color);
        }

        function formatTime(ms) {
            const totalSecs = ms / 1000;
            const m = Math.floor(totalSecs / 60);
            const s = Math.floor(totalSecs % 60);
            const dec = Math.floor((ms % 1000) / 100);
            if (m > 0) {
                return `${m}:${s.toString().padStart(2, '0')}.${dec}`;
            }
            return `${s.toString().padStart(2, '0')}.${dec}`;
        }

        function startSequence() {
            initAudio(); // Permiso de audio
            requestWakeLock(); // Bloquear pantalla
            targetMs = (parseInt(inputTarget.value) || 60) * 1000;
            
            btnStart.classList.add('hidden');
            btnStop.classList.remove('hidden');
            inputTarget.disabled = true;
            goalReached = false;

            // FASE: PREPARACIÓN
            state = 'PREP';
            startTime = Date.now();
            phaseText.textContent = "PREPARACIÓN";
            phaseText.className = "text-sm font-semibold tracking-widest text-amber-400 uppercase mb-1";
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const remaining = PREP_TIME - elapsed;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    startHanging();
                    return;
                }

                // Pitidos de preparación en segs 3, 2, 1
                if (remaining <= 3000 && remaining > 2900 || 
                    remaining <= 2000 && remaining > 1900 || 
                    remaining <= 1000 && remaining > 900) {
                    beepPrep();
                }

                timeDisplay.textContent = Math.ceil(remaining / 1000).toString();
                updateCircle((elapsed / PREP_TIME) * 100, '#fbbf24'); // Color Amber
            }, 50);
        }

        function startHanging() {
            state = 'HANGING';
            startTime = Date.now();
            phaseText.textContent = "¡CUÉLGATE!";
            phaseText.className = "text-sm font-semibold tracking-widest text-red-500 animate-pulse uppercase mb-1";
            
            beepStart();
            if(navigator.vibrate) navigator.vibrate([300, 100, 300]); // Vibración fuerte de inicio

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timeDisplay.textContent = formatTime(elapsed);
                
                // Progreso visual hacia el objetivo
                let percent = (elapsed / targetMs) * 100;
                if (percent > 100) percent = 100;
                updateCircle(percent, '#ef4444'); // Color Rojo activo

                // Alarma de objetivo
                if (elapsed >= targetMs && !goalReached) {
                    goalReached = true;
                    beepGoal();
                    if(navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 1000]); // Vibración extra fuerte
                    phaseText.textContent = "¡OBJETIVO LOGRADO!";
                    phaseText.className = "text-sm font-semibold tracking-widest text-emerald-400 uppercase mb-1 animate-bounce";
                    progressCircle.setAttribute('stroke', '#10b981'); // Cambia a verde
                }

            }, 50);
        }

        function stopSequence() {
            clearInterval(timerInterval);
            releaseWakeLock();
            
            let finalTimeMs = 0;
            if (state === 'HANGING') {
                finalTimeMs = Date.now() - startTime;
                saveSession(finalTimeMs, targetMs);
            }

            // Reset UI
            state = 'IDLE';
            btnStart.classList.remove('hidden');
            btnStop.classList.add('hidden');
            inputTarget.disabled = false;
            phaseText.textContent = "LISTO";
            phaseText.className = "text-sm font-semibold tracking-widest text-emerald-400 uppercase mb-1";
            timeDisplay.textContent = "00.0";
            updateCircle(0, '#10b981');
        }

        btnStart.addEventListener('click', startSequence);
        btnStop.addEventListener('click', stopSequence);

        // --- SISTEMA DE DATOS (Historial) ---
        function getHistory() {
            const data = localStorage.getItem('hangHistory');
            return data ? JSON.parse(data) : [];
        }

        function saveSession(achievedMs, targetMs) {
            const history = getHistory();
            const date = new Date().toISOString();
            history.unshift({ id: Date.now(), date, achievedMs, targetMs });
            localStorage.setItem('hangHistory', JSON.stringify(history));
            
            renderHistory();
            
            // Animación de guardado
            saveMsg.classList.remove('opacity-0');
            setTimeout(() => saveMsg.classList.add('opacity-0'), 2500);
        }

        function formatDate(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function renderHistory() {
            const history = getHistory();
            const listEl = document.getElementById('historyList');
            const emptyEl = document.getElementById('emptyHistory');
            
            listEl.innerHTML = '';
            
            if (history.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                history.forEach(item => {
                    const secAchieved = (item.achievedMs / 1000).toFixed(1);
                    const secTarget = (item.targetMs / 1000).toFixed(0);
                    const success = item.achievedMs >= item.targetMs;
                    
                    const div = document.createElement('div');
                    div.className = "p-4 flex justify-between items-center bg-slate-800 hover:bg-slate-750 transition";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${success ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}">
                                <i class="fa-solid ${success ? 'fa-check' : 'fa-fire'}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-white text-lg">${secAchieved}s</p>
                                <p class="text-xs text-slate-400">${formatDate(item.date)}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-500 uppercase tracking-wide">Meta</p>
                            <p class="font-semibold text-slate-300">${secTarget}s</p>
                        </div>
                    `;
                    listEl.appendChild(div);
                });
            }
        }

        function clearHistory() {
            if (confirm("¿Estás seguro de que quieres borrar todo el progreso? Esto no se puede deshacer.")) {
                localStorage.removeItem('hangHistory');
                renderHistory();
            }
        }

        // --- BACKUP Y RESTAURACIÓN ---
        function exportData() {
            const dataStr = localStorage.getItem('hangHistory') || '[]';
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().split('T')[0];
            a.download = `hang_backup_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const parsed = JSON.parse(content);
                    if (Array.isArray(parsed)) {
                        localStorage.setItem('hangHistory', content);
                        renderHistory();
                        alert("Historial importado exitosamente.");
                        switchTab('history');
                    } else {
                        alert("El archivo no tiene el formato correcto.");
                    }
                } catch (err) {
                    alert("Error al leer el archivo JSON.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        // --- NAVEGACIÓN DE TABS ---
        function switchTab(tabId) {
            // Ocultar todas las vistas
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Mostrar la seleccionada
            document.getElementById('view-' + tabId).classList.add('active');
            
            // Actualizar estilo botones inferiores
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.target === tabId) {
                    btn.classList.remove('text-slate-500');
                    btn.classList.add('text-emerald-400');
                } else {
                    btn.classList.add('text-slate-500');
                    btn.classList.remove('text-emerald-400');
                }
            });

            if(tabId === 'history') renderHistory();
        }

        // --- PWA INSTALL PROMPT ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btnInstall = document.getElementById('btnInstall');
            btnInstall.classList.remove('hidden');
            
            btnInstall.addEventListener('click', async () => {
                btnInstall.classList.add('hidden');
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            });
        });

        // Init
        renderHistory();

    </script>
</body>
</html>
